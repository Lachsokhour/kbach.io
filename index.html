<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kbach.io — ក្បាច់</title>
  <link rel="icon" type="image/png"
    href="https://lh3.googleusercontent.com/a/ACg8ocKvFKZWo1wv_W9Z9pkpmZJHEDk8yyOn3LEF1ecQ4bxHwQKQ_9w=s192-c-mo">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <img class="logo-img"
        src="https://lh3.googleusercontent.com/a/ACg8ocKvFKZWo1wv_W9Z9pkpmZJHEDk8yyOn3LEF1ecQ4bxHwQKQ_9w=s192-c-mo"
        alt="logo">
      <span style="font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:-0.03em">Kbach.io</span><span
        style="font-family:'Kantumruy Pro',sans-serif;font-weight:600;font-size:13px;opacity:0.55;margin-left:6px;letter-spacing:0.01em">ក្បាច់</span>
      <div style="flex:1"></div>
      <button class="btn btn-theme" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle dark/light mode">
        <i data-lucide="moon"></i>
      </button>
    </div>

    <div class="topbar-section" style="gap:6px">
      <select class="scale-select" id="preset-sel" onchange="loadPreset()"
        style="font-size:11px;padding:4px 8px;max-width:160px">
        <option value="">Custom</option>
        <optgroup label="Social">
          <option value="1200,630">OG / Twitter — 1200×630</option>
          <option value="1080,1080">Instagram Square — 1080×1080</option>
          <option value="1080,1920">Instagram Story — 1080×1920</option>
          <option value="1080,566">Instagram Landscape — 1080×566</option>
          <option value="1200,628">Facebook Post — 1200×628</option>
          <option value="820,312">Facebook Cover — 820×312</option>
          <option value="1500,500">Twitter Header — 1500×500</option>
          <option value="800,800">LinkedIn Post — 800×800</option>
          <option value="1128,191">LinkedIn Banner — 1128×191</option>
        </optgroup>
        <optgroup label="Presentation">
          <option value="1920,1080">Full HD 16:9 — 1920×1080</option>
          <option value="2560,1440">2K — 2560×1440</option>
          <option value="1280,720">HD 720p — 1280×720</option>
          <option value="1024,768">XGA 4:3 — 1024×768</option>
        </optgroup>
        <optgroup label="Print (px @96dpi)">
          <option value="794,1123">A4 Portrait — 794×1123</option>
          <option value="1123,794">A4 Landscape — 1123×794</option>
          <option value="816,1056">US Letter — 816×1056</option>
        </optgroup>
        <optgroup label="Cards">
          <option value="600,360">Profile Card — 600×360</option>
          <option value="900,380">Event Ticket — 900×380</option>
          <option value="420,680">Receipt — 420×680</option>
        </optgroup>
      </select>
    </div>

    <div class="topbar-section" style="gap:6px; flex-direction:row; align-items:center;">
      <span class="topbar-label" style="margin-left:4px">W</span>
      <input class="dim-input" id="inp-w" type="number" value="1200" min="100" max="4000" oninput="onDimInput()">
      <span class="dim-x">×</span>
      <span class="topbar-label">H</span>
      <input class="dim-input" id="inp-h" type="number" value="630" min="100" max="4000" oninput="onDimInput()"
        placeholder="auto">
      <label class="auto-h-toggle" title="Auto-detect height from content">
        <input type="checkbox" id="auto-h" onchange="onAutoHChange()">
        <span class="auto-h-label">auto H</span>
      </label>
    </div>

    <div class="topbar-section">
      <span class="topbar-label">Scale</span>
      <select class="topbar-select" id="preview-scale" onchange="updatePreviewSize()">
        <option value="0.2">20%</option>
        <option value="0.25">25%</option>
        <option value="0.33">33%</option>
        <option value="0.5" selected>50%</option>
        <option value="0.67">67%</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
      </select>
    </div>

    <div class="topbar-section">
      <span class="topbar-label">Export @</span>
      <select class="scale-select" id="export-scale" onchange="updateExportLabel()">
        <option value="1">1× — standard</option>
        <option value="2" selected>2× — retina</option>
        <option value="3">3× — high res</option>
        <option value="4">4× — ultra HD</option>
      </select>
      <span class="topbar-label" id="export-px-label" style="font-size:9px;color:var(--muted);letter-spacing:0"></span>
    </div>

    <div class="topbar-section">
      <label class="auto-h-toggle" title="Show branding watermark on image">
        <input type="checkbox" id="show-watermark" onchange="renderPreview()">
        <span class="auto-h-label">Watermark</span>
      </label>
    </div>

    <div class="spacer"></div>

    <!-- Removed btn-theme from here -->
    <button class="btn btn-copy-html" onclick="copyHTML()" aria-label="Copy HTML to clipboard">
      <i data-lucide="copy"></i> Copy HTML
    </button>
    <button class="btn btn-export" onclick="exportPNG()" aria-label="Export PNG image">
      <i data-lucide="download"></i> Export PNG
    </button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Editor -->
    <div class="editor-pane">
      <div class="pane-header">
        <span class="pane-title">HTML Editor</span>
        <span class="pane-badge live" id="live-badge"><i data-lucide="circle" class="live-dot"></i> live</span>
        <div style="flex:1"></div>
        <button class="btn" onclick="formatHTML()"><i data-lucide="sparkles"></i> <span class="btn-text">Format</span></button>
        <button class="btn btn-clear-action" id="btn-clear" onclick="clearEditor()"><i data-lucide="trash-2"></i> <span class="btn-text">Clear</span></button>
      </div>

      <div class="tpl-row" id="tpl-row">
        <button class="tpl-chip" onclick="loadTemplate('og')">OG Card 1200×630</button>
        <button class="tpl-chip" onclick="loadTemplate('quote')">Quote Card</button>
        <button class="tpl-chip" onclick="loadTemplate('profile')">Profile Card</button>
        <button class="tpl-chip" onclick="loadTemplate('announce')">Announcement</button>
        <button class="tpl-chip" onclick="loadTemplate('ticket')">Event Ticket</button>
        <button class="tpl-chip" onclick="loadTemplate('receipt')">Receipt</button>
        <button class="tpl-chip" onclick="loadTemplate('emoji')">Emoji Test</button>
      </div>

      <div class="editor-area">
        <div class="editor-lines" id="line-nums"></div>
        <div id="html-editor" class="language-markup" spellcheck="false" autocomplete="off" autocorrect="off"></div>
      </div>

      <div class="editor-status">
        <span id="status-chars">0 chars</span>
        <span id="status-lines">0 lines</span>
        <span class="status-pill" id="status-dim">1200 × 630</span>
        <div style="flex:1"></div>
        <span id="status-msg" style="color:var(--accent)"></span>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-pane">
      <div class="pane-header">
        <span class="pane-title">Preview</span>
        <span class="pane-badge" id="preview-size-badge">1200 × 630</span>
        <div style="flex:1"></div>
        <button class="btn" onclick="toggleEffectsPanel()"><i data-lucide="sparkles"></i> Effects</button>
        <button class="btn" onclick="reloadPreview()"><i data-lucide="refresh-cw"></i> Reload</button>
      </div>

      <div class="preview-viewport" id="preview-viewport">
        <div class="preview-wrap" id="preview-wrap">
          <div class="preview-frame-label" id="frame-label">1200 × 630px</div>
          <iframe id="preview-iframe" width="1200" height="630"></iframe>
        </div>
        <div class="preview-loading" id="preview-loading">
          <div class="spinner"></div>
          <span>Generating image…</span>
        </div>

        <!-- Effects Panel -->
        <div id="effects-panel" class="effects-panel hidden">
          <div class="ep-header">
            <span class="ep-title">Effects</span>
            <div style="display:flex; gap: 4px;">
              <button class="ep-reset" onclick="resetEffects()" aria-label="Reset Effects" title="Reset to defaults">
                <i data-lucide="rotate-ccw"></i>
              </button>
              <button class="ep-reset" onclick="closeEffectsPanel()" aria-label="Close Panel" title="Close Panel">
                <i data-lucide="x"></i>
              </button>
            </div>
          </div>
          
          <div class="ep-control">
            <div class="ep-label-row">
              <span class="ep-label">Blur</span>
              <span class="ep-value" id="val-blur">0px</span>
            </div>
            <input type="range" class="ep-slider" id="rng-blur" min="0" max="20" step="1" value="0" oninput="onEffectChange()">
          </div>

          <div class="ep-control">
            <div class="ep-label-row">
              <span class="ep-label">Noise</span>
              <span class="ep-value" id="val-noise">0%</span>
            </div>
            <input type="range" class="ep-slider" id="rng-noise" min="0" max="100" step="1" value="0" oninput="onEffectChange()">
          </div>

          <div class="ep-control">
            <div class="ep-label-row">
              <span class="ep-label">Saturation</span>
              <span class="ep-value" id="val-sat">100%</span>
            </div>
            <input type="range" class="ep-slider" id="rng-sat" min="0" max="200" step="1" value="100" oninput="onEffectChange()">
          </div>

          <div class="ep-control">
            <div class="ep-label-row">
              <span class="ep-label">Opacity</span>
              <span class="ep-value" id="val-opac">100%</span>
            </div>
            <input type="range" class="ep-slider" id="rng-opac" min="0" max="100" step="1" value="100" oninput="onEffectChange()">
          </div>
        </div>
        <!-- End Effects Panel -->

      </div>

      <div class="output-bar">
        <button class="output-header" onclick="toggleOutput()" aria-expanded="false" aria-controls="output-body" aria-label="Toggle export output panel">
          <i class="lucide-icon out-icon" data-lucide="chevron-right" id="out-icon"></i>
          <span class="pane-title">Output</span>
          <span class="pane-badge" id="out-badge" style="display:none">PNG ready</span>
        </button>
        <div class="output-body" id="output-body">
          <img id="output-thumb" alt="output">
          <div class="output-info" id="output-info"></div>
          <button class="btn btn-copy" onclick="copyImage()" style="margin-top:8px">
            <i data-lucide="copy"></i> Copy Image
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="app-footer">
    <span class="footer-highlight">© 2026</span>
    <span class="sep">·</span>
    <span style="font-family:'Nunito',sans-serif;font-weight:800">Kbach.io</span><span
      style="font-family:'Kantumruy Pro',sans-serif;font-size:10px;opacity:0.6;margin-left:4px">ក្បាច់</span>
    <span class="sep">·</span>
    <span><span class="footer-highlight">Powered by</span> <span class="author">Sokhour LACH</span></span>
  </div>

  <!-- Mobile Action Bar -->
  <div class="mobile-action-bar hidden-desktop">
    <button class="btn" onclick="formatHTML()" aria-label="Format HTML">
      <i data-lucide="sparkles"></i>
    </button>
    <button class="btn btn-clear-action" onclick="clearEditor()" aria-label="Clear Editor">
      <i data-lucide="trash-2"></i> <span class="btn-text">Clear</span>
    </button>
    <button class="btn btn-export" onclick="exportPNG()" aria-label="Export PNG image">
      <i data-lucide="download"></i> Export PNG
    </button>
  </div>
  <script src="js/templates.js"></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
